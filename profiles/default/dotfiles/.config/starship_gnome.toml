"$schema" = 'https://starship.rs/config-schema.json'

# --- FORMATO PRINCIPAL ---
# Usamos $fill para empujar el tiempo a la derecha, y LUEGO el $line_break
format = """
[░▒▓](fg:color_os)\
$os\
$username\
[](bg:color_dir fg:color_os)\
$directory\
[](fg:color_dir bg:color_git)\
$git_branch\
$git_status\
[](fg:color_git bg:color_langs)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](fg:color_langs bg:color_tools)\
$docker_context\
$conda\
$pixi\
[](fg:color_tools)\
$fill\
[](fg:color_time)\
$time\
[](fg:color_time)\
$line_break$character"""

palette = 'cool_blue'

[palettes.cool_blue]
color_fg_main = '#a3aed2'
color_fg_dark = '#090c0c'
color_fg_light = '#e3e5e5'

color_os = '#a3aed2'
color_dir = '#769ff0'
color_git = '#394260'
color_langs = '#212736'
color_tools = '#1d2230'
color_time = '#1d2230'

color_green = '#a3aed2'
color_red = '#ff7b72'
color_purple = '#d2a8ff'
color_yellow = '#f2cc60'

# --- MÓDULO DE RELLENO (El secreto para el reloj a la derecha) ---
[fill]
symbol = ' '

# --- MÓDULOS CON ESPACIADO EXTRA PARA KITTY ---
# Fíjate que ahora hay dos espacios '[ $symbol' en lugar de uno.
# Esto evita que Kitty corte la izquierda del ícono.

[os]
disabled = false
style = "bg:color_os fg:color_fg_dark"
format = '[ $symbol ]($style)'

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
EndeavourOS = ""
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"
Pop = ""

[username]
show_always = false
style_user = "bg:color_os fg:color_fg_dark"
style_root = "bg:color_os fg:color_fg_dark"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg_light bg:color_dir"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "~/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "

[git_branch]
symbol = ""
style = "fg:color_dir bg:color_git"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:color_dir bg:color_git"
format = '[$all_status$ahead_behind ]($style)'

[nodejs]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[c]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[php]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[kotlin]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ""
style = "fg:color_dir bg:color_langs"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = ""
style = "fg:color_fg_main bg:color_tools"
format = '[ $symbol ($context) ]($style)'

[conda]
style = "fg:color_fg_main bg:color_tools"
format = '[ $symbol ($environment) ]($style)'

[pixi]
style = "fg:color_fg_main bg:color_tools"
format = '[ $symbol ($version) ($environment) ]($style)'

[time]
disabled = false
time_format = "%R"
style = "fg:color_fg_main bg:color_time"
format = '[  $time ]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[\$](bold fg:color_green)'
error_symbol = '[\$](bold fg:color_red)'
vimcmd_symbol = '[](bold fg:color_green)'
vimcmd_replace_one_symbol = '[](bold fg:color_purple)'
vimcmd_replace_symbol = '[](bold fg:color_purple)'
vimcmd_visual_symbol = '[](bold fg:color_yellow)'
